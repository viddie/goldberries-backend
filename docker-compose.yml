services:
  backend:
    build: .
    container_name: backend
    user: "${UID}:${GID}"
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  cron:
    build: .
    container_name: backend-cron
    user: "${UID}:${GID}"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
    command: ["cron", "-f"]

  db:
    image: postgres:17
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${GB_DBNAME}
      POSTGRES_USER: ${GB_DBUSER}
      POSTGRES_PASSWORD: ${GB_DBPASS}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data:/tmp/goldberries-data
      - ./data/restore-backup.sh:/docker-entrypoint-initdb.d/restore-backup.sh:ro
    restart: unless-stopped

volumes:
  postgres-data:
